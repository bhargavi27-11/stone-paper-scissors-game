<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissors Game</title>
    <link rel="stylesheet" href="stone.css">
</head>
<body>
    <h1>Stone Paper Scissors Game</h1>
    <div class="game-container">
        <div class="choices">
            <button id="stone" class="choice">Stone</button>
            <button id="paper" class="choice">Paper</button>
            <button id="scissors" class="choice">Scissors</button>
        </div>
        <div class="score-board">
            <div class="score">
                <p class="player-score">0</p>
                <p>YOU</p>
            </div>
            <div class="score">
                <p class="computer-score">0</p>
                <p>COMPUTER</p>
            </div>
        </div>
        <p class="result hide">Game started. Let's play again!</p>
        <button class="reset">Reset Game</button>
    </div>
    <script src="stone.js"></script>
</body>
</html>
